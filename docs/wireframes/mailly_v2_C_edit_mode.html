<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaiLLY v2 — C: 編集モード</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #4F46E5; --primary-light: #EEF2FF; --primary-text: #3730A3;
  --bg-page: #F8F8F6; --bg-card: #FFFFFF; --bg-hover: #F5F5F3;
  --text-primary: #1A1A1A; --text-secondary: #6B7280; --text-tertiary: #9CA3AF;
  --border: #E5E7EB; --font: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
}
body { font-family: var(--font); background: var(--bg-page); padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 24px; }
.label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); align-self: flex-start; }
.container { width: 360px; display: flex; flex-direction: column; gap: 8px; }
.toggle-btn { align-self: flex-end; padding: 4px 12px; font-size: 11px; font-weight: 500; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text-secondary); cursor: pointer; font-family: var(--font); transition: all 0.12s ease; }
.toggle-btn:hover { background: var(--bg-hover); }
.editor-wrap { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; }
.para-list { padding: 10px 14px; display: flex; flex-direction: column; gap: 2px; }
.para-block { border-radius: 6px; padding: 6px 8px; cursor: pointer; transition: background 0.12s ease; position: relative; }
.para-block:hover:not(.editing) { background: var(--bg-hover); }
.para-block:hover:not(.editing) .para-hint { opacity: 1; }
.para-block.editing { cursor: default; }
.para-text { font-size: 13px; line-height: 1.8; color: var(--text-primary); }
.para-hint { position: absolute; top: 7px; right: 8px; font-size: 10px; color: var(--text-tertiary); opacity: 0; transition: opacity 0.12s ease; pointer-events: none; }
.para-edit-box { border: 1.5px solid var(--primary); border-radius: 8px; overflow: hidden; background: var(--bg-card); }
.para-textarea { width: 100%; padding: 8px 10px; font-size: 13px; line-height: 1.8; color: var(--text-primary); font-family: var(--font); border: none; outline: none; resize: none; background: transparent; display: block; }
.para-ai-divider { height: 0.5px; background: var(--border); }
.para-ai-row { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: #FAFAFA; }
.para-ai-input { flex: 1; font-size: 12px; color: var(--text-primary); font-family: var(--font); border: none; outline: none; background: transparent; }
.para-ai-input::placeholder { color: var(--text-tertiary); }
.para-gen-btn { padding: 3px 10px; font-size: 11px; font-weight: 500; border-radius: 20px; border: none; background: #D1D5DB; color: #fff; cursor: pointer; font-family: var(--font); transition: background 0.12s ease; flex-shrink: 0; }
.para-gen-btn.ready { background: var(--primary); }
.para-actions { display: flex; justify-content: flex-end; gap: 6px; padding: 6px 10px; border-top: 0.5px solid var(--border); background: #FAFAFA; }
.para-btn { padding: 3px 9px; font-size: 11px; font-weight: 500; border-radius: 5px; cursor: pointer; font-family: var(--font); }
.para-btn.confirm { background: var(--primary); color: #fff; border: none; }
.para-btn.cancel { background: transparent; color: var(--text-secondary); border: 0.5px solid var(--border); }
.global-editor { width: 100%; padding: 16px; font-size: 13px; line-height: 1.8; color: var(--text-primary); font-family: var(--font); border: none; outline: none; resize: none; background: transparent; min-height: 240px; display: block; }
.global-ai-wrap { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 12px; }
.global-ai-label { font-size: 11px; color: var(--text-tertiary); margin-bottom: 4px; }
.global-ai-row { display: flex; align-items: flex-end; gap: 8px; }
.global-ai-input { flex: 1; font-size: 13px; line-height: 1.5; color: var(--text-primary); font-family: var(--font); border: none; outline: none; resize: none; background: transparent; min-height: 20px; max-height: 80px; }
.global-ai-input::placeholder { color: var(--text-tertiary); }
.global-gen-btn { padding: 5px 14px; font-size: 13px; font-weight: 500; border-radius: 20px; border: none; background: #D1D5DB; color: #fff; cursor: pointer; font-family: var(--font); transition: background 0.12s ease; flex-shrink: 0; }
.global-gen-btn.ready { background: var(--primary); }
.footer-row { display: flex; justify-content: flex-end; padding-top: 4px; }
.send-btn { background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; padding: 7px 18px; cursor: pointer; font-family: var(--font); }
.note { width: 360px; padding: 12px 16px; background: var(--bg-card); border: 0.5px solid var(--border); border-radius: 8px; font-size: 12px; color: var(--text-secondary); line-height: 1.6; align-self: flex-start; }
.note strong { color: var(--text-primary); }
</style>
</head>
<body>
<div class="label">MaiLLY v2 — C: 編集モード（ワイヤー確定）</div>
<div class="container">
  <button class="toggle-btn" id="toggle-btn">全体を編集</button>
  <div id="mode-para">
    <div class="editor-wrap"><div class="para-list" id="para-list"></div></div>
    <div class="footer-row"><button class="send-btn">Send</button></div>
  </div>
  <div id="mode-global" style="display:none; flex-direction:column; gap:8px;">
    <div class="editor-wrap">
      <textarea class="global-editor">田中様

お世話になっております。

ご連絡いただきありがとうございます。契約書を確認いたしました。契約期間・支払い条件・解約条項、いずれも問題ございません。

ミーティングの件、5月27日（火）10:00〜でいかがでしょうか。

どうぞよろしくお願いいたします。</textarea>
    </div>
    <div class="global-ai-wrap">
      <div class="global-ai-label">AIに修正を依頼</div>
      <div class="global-ai-row">
        <textarea class="global-ai-input" id="global-ai-input" placeholder="例：全体をもう少し柔らかい表現にして" rows="1"></textarea>
        <button class="global-gen-btn" id="global-gen-btn">生成</button>
      </div>
    </div>
    <div class="footer-row"><button class="send-btn">Send</button></div>
  </div>
</div>
<div class="note">
  <strong>実装メモ：</strong>
  デフォルトは段落ごとに編集モード。段落クリックで編集ボックスが展開し、テキスト編集＋AI修正入力欄が一体化。トグルボタン1つで全体編集モードに切り替え。Regenerateボタンは不要（段落単位のAI修正で代替）。
</div>
<script>
const paragraphs = ["田中様","お世話になっております。","ご連絡いただきありがとうございます。契約書を確認いたしました。契約期間・支払い条件・解約条項、いずれも問題ございません。","ミーティングの件、5月27日（火）10:00〜でいかがでしょうか。","どうぞよろしくお願いいたします。"];
let editingIndex = null, isGlobal = false;
function renderPara() {
  const list = document.getElementById('para-list');
  list.innerHTML = '';
  paragraphs.forEach((text, i) => {
    const block = document.createElement('div');
    block.className = 'para-block' + (editingIndex === i ? ' editing' : '');
    if (editingIndex === i) {
      block.innerHTML = `<div class="para-edit-box"><textarea class="para-textarea" id="pta-${i}">${text}</textarea><div class="para-ai-divider"></div><div class="para-ai-row"><input class="para-ai-input" id="pai-${i}" placeholder="AIに修正を依頼"/><button class="para-gen-btn" id="pgb-${i}">生成</button></div><div class="para-actions"><button class="para-btn cancel">Cancel</button><button class="para-btn confirm">Done</button></div></div>`;
      block.querySelector('.para-btn.confirm').addEventListener('click', e => { e.stopPropagation(); paragraphs[i] = block.querySelector('textarea').value; editingIndex = null; renderPara(); });
      block.querySelector('.para-btn.cancel').addEventListener('click', e => { e.stopPropagation(); editingIndex = null; renderPara(); });
      const pai = block.querySelector(`#pai-${i}`), pgb = block.querySelector(`#pgb-${i}`);
      pai.addEventListener('input', () => pgb.classList.toggle('ready', pai.value.trim().length > 0));
      pgb.addEventListener('click', e => { e.stopPropagation(); if (!pai.value.trim()) return; pgb.textContent = '生成中...'; setTimeout(() => { pgb.textContent = '生成'; pgb.classList.remove('ready'); pai.value = ''; }, 900); });
      setTimeout(() => { const ta = document.getElementById(`pta-${i}`); if (ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; ta.focus(); ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }); } }, 0);
    } else {
      block.innerHTML = `<div class="para-text">${text}</div><span class="para-hint">クリックで編集</span>`;
      block.addEventListener('click', () => { editingIndex = i; renderPara(); });
    }
    list.appendChild(block);
  });
}
renderPara();
const toggleBtn = document.getElementById('toggle-btn'), modePara = document.getElementById('mode-para'), modeGlobal = document.getElementById('mode-global');
toggleBtn.addEventListener('click', () => {
  isGlobal = !isGlobal;
  if (isGlobal) { toggleBtn.textContent = '段落ごとに編集'; modePara.style.display = 'none'; modeGlobal.style.display = 'flex'; }
  else { toggleBtn.textContent = '全体を編集'; modeGlobal.style.display = 'none'; modePara.style.display = 'block'; editingIndex = null; renderPara(); }
});
const gai = document.getElementById('global-ai-input'), ggb = document.getElementById('global-gen-btn');
gai.addEventListener('input', () => { ggb.classList.toggle('ready', gai.value.trim().length > 0); gai.style.height = 'auto'; gai.style.height = gai.scrollHeight + 'px'; });
ggb.addEventListener('click', () => { if (!gai.value.trim()) return; ggb.textContent = '生成中...'; setTimeout(() => { ggb.textContent = '生成'; ggb.classList.remove('ready'); gai.value = ''; gai.style.height = 'auto'; }, 900); });
</script>
</body>
</html>
